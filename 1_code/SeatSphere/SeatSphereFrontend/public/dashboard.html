<!DOCTYPE html>
<html>
<head>
    <title>SeatSphere | My Tickets</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- -------------- NAVIGATION BAR------------------------->  
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">SEATSPHERE</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/index.html">HappySeats</a>
                <a class="nav-link" href="/">Movies</a>
                <a class="nav-link active" href="/my-bookings">Tickets</a>
                <a class="nav-link btn btn-outline-primary ms-lg-3" href="/login">Login</a>
            </div>
        </div>
    </nav>

    <!-- -------------- MAIN CONTENT ------------------------->  
    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Bookings</h2>
            <p class="text-muted">Live entries from the SeatSphere database.</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Booking ID</th>
                            <th>Movie</th>
                            <th>Showtime</th>
                            <th>Total Price</th>
                            <th>Ticket Codes</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-table-body">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- -------------- JAVASCRIPT ------------------------->  
    <script>
async function loadDashboard() {
    const tableBody = document.getElementById('bookings-table-body');

    try {
        // Fetch bookings from Node.js proxy
        const response = await fetch('/api/bookings');

        if (!response.ok) {
            throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const bookings = await response.json();

        if (!bookings || bookings.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-4">No bookings found in database.</td></tr>';
            return;
        }

        // Populate table with live data
        tableBody.innerHTML = bookings.map(b => `
            <tr>
                <td class="fw-bold">#${b.id}</td>
                <td>${b.showtime.movie.title}</td>
                <td>${new Date(b.showtime.startTime).toLocaleString([], {hour: '2-digit', minute:'2-digit'})}</td>
                <td class="text-primary fw-bold">$${b.totalAmount.toFixed(2)}</td>
                <td>
                    ${b.tickets.map(t => `<span class="badge bg-success font-monospace m-1">${t.qrCodeData}</span>`).join('')}
                </td>
            </tr>
        `).join('');

    } catch (error) {
        console.error('Error loading bookings:', error);
        tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error loading bookings.</td></tr>';
    }
}

// Initialize dashboard after DOM loads
document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
